samples: dev/integration_case_builder/dataset/generated/samples.tsv
outdir: results

sibeliaz:
  min_block_len: 30

block_filtering:
  min_len: 450

repeat_masking:
  te_lib: ".tests/integration/resources/mini_TE_lib.fasta"

mafft:
  extra_options: "" #--genafpair --maxiterate 1000

snp_detection:
  min_flank: 0 #100

snp_group_filtering:
  group_a:
    - Karur
  group_b:
    - Soldur

batching:
  blocks_per_job: 2

visualization:
  dotplot_pivot: ""
  title: "Test dataset"
  selected_markers_tsv: "dev/integration_case_builder/dataset/selected_snps/selected_markers.tsv"
  

gff_tracks:
  Belalur:
    LiftOn (Svevo2) genes: "dev/integration_case_builder/dataset/gffs/Belalur_all.gff"
    LRR genes: "dev/integration_case_builder/dataset/gffs/Belalur_LRR.gff"
  Dic2:
    LiftOn (Svevo2) genes: "dev/integration_case_builder/dataset/gffs/Dic2_all.gff"
  Soldur:
    WAK genes: "dev/integration_case_builder/dataset/gffs/Soldur_wak.gff"
