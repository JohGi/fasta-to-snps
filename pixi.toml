[workspace]
authors = ["JohGi <tjohanna.girodolle@gmail.com>"]
channels = ["conda-forge", "bioconda"]
name = "from_fasta_to_snps"
platforms = ["linux-64"]
version = "0.1.0"

[tasks]

[feature.workflow.dependencies]
python = ">=3.13.12,<3.14"
snakemake = ">=9.19.0,<10"
snakemake-executor-plugin-slurm = ">=2.6.0,<3"
sibeliaz = ">=1.2.7,<2"
pytest = ">=9.0.2,<10"
bedtools = ">=2.31.1,<3"
repeatmasker = ">=4.2.3,<5"
mafft = ">=7.526,<8"
seqtui = ">=0.1.1,<0.2"
biopython = ">=1.87,<2"
polars = ">=1.39.3,<2"
perl = ">=5.32.1,<5.33"
minimap2 = ">=2.30,<3"
plotly = ">=6.6.0,<7"
pdf2svg = ">=0.2.4,<0.3"
emboss = ">=6.6.0,<7"
pyyaml = ">=6.0.3,<7"

[feature.dotplot.dependencies]
python = "3.9.*"
blastn2dotplots = "==1.1.2"
numpy = ">=1.24,<2"
perl = "*"
minimap2 = "*"

[feature.mashtree.dependencies]
mashtree = ">=1.4.6,<2"

[environments]
default = { features = ["workflow"], no-default-feature = true }
dotplot = { features = ["dotplot"], no-default-feature = true }
mashtree = { features = ["mashtree"], no-default-feature = true }
